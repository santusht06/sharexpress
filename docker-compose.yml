version: "3.9"

services:

  backend:
    build:
      context: ./backend

    image: santusht69/sharexpress-backend:v1

    container_name: sharexpress_backend

    ports:
      - "127.0.0.1:8000:8000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    image: santusht69/sharexpress-frontend:v1

    container_name: sharexpress_frontend

    ports:
      - "127.0.0.1:3000:80"

    depends_on:
      - backend

    restart: unless-stopped