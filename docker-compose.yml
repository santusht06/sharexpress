version: "3.9"

services:

  backend:
    build: ./backend
    container_name: sharexpress_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: sharexpress_frontend
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: sharexpress_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    restart: always