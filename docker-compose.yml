version: "3.9"

services:

  backend:
    image: santusht69/sharexpress-backend:v1
    container_name: sharexpress_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    image: santusht69/sharexpress-frontend:v1
    container_name: sharexpress_frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: unless-stopped